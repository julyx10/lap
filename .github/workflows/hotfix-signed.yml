name: Hotfix Signed Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Empty = current default branch."
        required: false
        type: string
      target:
        description: "macOS target architecture"
        required: true
        default: "aarch64-apple-darwin"
        type: choice
        options:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
      notarize:
        description: "Notarize and staple DMG"
        required: true
        default: true
        type: boolean
      publish_prerelease:
        description: "Also publish to a GitHub prerelease (draft)"
        required: true
        default: false
        type: boolean
      prerelease_tag:
        description: "Optional prerelease tag (e.g. hotfix-issue-13). Empty = auto-generated."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: hotfix-signed-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  build-hotfix:
    runs-on: ${{ github.event.inputs.target == 'x86_64-apple-darwin' && 'macos-15-intel' || 'macos-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install system dependencies
        run: brew install nasm pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: hotfix-${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            hotfix-${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ github.event.inputs.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: hotfix-${{ runner.os }}-${{ github.event.inputs.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            hotfix-${{ runner.os }}-${{ github.event.inputs.target }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src-vite

      - name: Download AI Models
        shell: bash
        run: bash scripts/download_models.sh

      - name: Build and sign hotfix package
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          args: --verbose --target ${{ github.event.inputs.target }} --bundles app,dmg --config '{"bundle":{"createUpdaterArtifacts":false},"plugins":{"updater":null}}'

      - name: Notarize and staple DMG
        if: github.event.inputs.notarize == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          DMG_PATH=$(find src-tauri/target/${{ github.event.inputs.target }}/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          fi
          if [ -z "$DMG_PATH" ]; then
            echo "Could not find DMG for notarization."
            exit 1
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

          # Compatible with versions that expect TAURI_KEY_PASSWORD
          export TAURI_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
          npx -y @tauri-apps/cli signer sign "$DMG_PATH"

      - name: Upload signed hotfix artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hotfix-macos-${{ github.event.inputs.target }}-${{ github.run_number }}
          path: |
            src-tauri/target/${{ github.event.inputs.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/${{ github.event.inputs.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error

      - name: Resolve prerelease metadata
        if: github.event.inputs.publish_prerelease == 'true'
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.prerelease_tag }}" ]; then
            TAG="${{ github.event.inputs.prerelease_tag }}"
          else
            TAG="hotfix-${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=Hotfix Build $TAG" >> "$GITHUB_OUTPUT"

      - name: Publish draft prerelease
        if: github.event.inputs.publish_prerelease == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.title }}
          draft: true
          prerelease: true
          generate_release_notes: false
          files: |
            src-tauri/target/${{ github.event.inputs.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
