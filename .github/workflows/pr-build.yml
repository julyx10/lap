name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: pr-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - name: Install system dependencies
        run: brew install nasm pkg-config autoconf automake libtool

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Patch ffmpeg-sys-next (macOS arm64 compatibility)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail

          cargo fetch --manifest-path src-tauri/Cargo.toml

          BUILD_RS=$(find ~/.cargo/registry/src -type f -path "*/ffmpeg-sys-next-*/build.rs" | head -n 1)
          if [ -z "${BUILD_RS}" ]; then
            echo "Could not find ffmpeg-sys-next build.rs"
            exit 1
          fi

          perl -0777 -i -pe 's@configure\.arg\("--extra-cflags=-march=native -mtune=native"\);\n@if matches!(env::var("CARGO_CFG_TARGET_OS").as_deref(), Ok("macos"))\n            && matches!(env::var("CARGO_CFG_TARGET_ARCH").as_deref(), Ok("aarch64")) {\n            configure.arg("--disable-asm");\n        } else {\n            configure.arg("--extra-cflags=-march=native -mtune=native");\n        }\n@' "$BUILD_RS"

          echo "Patched file: $BUILD_RS"
          if ! grep -q 'CARGO_CFG_TARGET_OS' "$BUILD_RS"; then
            echo "Patch did not apply as expected."
            exit 1
          fi
          grep -n "CARGO_CFG_TARGET_OS\\|disable-asm\\|march=native" "$BUILD_RS"

      - name: Clear cached ffmpeg-sys-next build artifacts
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          rm -rf src-tauri/target/${{ matrix.target }}/release/build/ffmpeg-sys-next-*
          rm -rf src-tauri/target/${{ matrix.target }}/debug/build/ffmpeg-sys-next-*
          rm -rf src-tauri/target/release/build/ffmpeg-sys-next-*
          rm -rf src-tauri/target/debug/build/ffmpeg-sys-next-*

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: src-vite

      - name: Download AI Models
        shell: bash
        run: bash scripts/download_models.sh

      - name: Build and Sign
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          args: --target ${{ matrix.target }} --verbose --bundles dmg --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Verify ffmpeg configure flags
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_MAK=$(find src-tauri/target -type f -path "*/ffmpeg-sys-next-*/out/ffmpeg-*/ffbuild/config.mak" | head -n 1)
          if [ -z "${CONFIG_MAK}" ]; then
            echo "Could not find ffmpeg config.mak"
            exit 1
          fi

          echo "Using ffmpeg config: $CONFIG_MAK"
          grep -n "FFMPEG_CONFIGURATION" "$CONFIG_MAK"

          if ! grep -q -- "--disable-asm" "$CONFIG_MAK"; then
            echo "Expected --disable-asm was not found in ffmpeg configuration."
            exit 1
          fi

          if grep -q -- "-march=native" "$CONFIG_MAK"; then
            echo "Unexpected -march=native found in ffmpeg configuration."
            exit 1
          fi

      - name: Notarize and Staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "Finding DMG for notarization..."
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          fi
          if [ -z "$DMG_PATH" ]; then
            echo "Error: Could not find generated DMG file."
            exit 1
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

          export TAURI_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
          npx -y @tauri-apps/cli signer sign "$DMG_PATH"

      - name: Rename macOS package for PR build
        shell: bash
        run: |
          set -euo pipefail

          SUFFIX="pr-${{ github.event.pull_request.number || github.run_number }}"
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: Could not find generated DMG file."
            exit 1
          fi

          DMG_DIR="$(dirname "$DMG_PATH")"
          DMG_NAME="$(basename "$DMG_PATH")"
          DMG_BASE="${DMG_NAME%.dmg}"
          mv "$DMG_PATH" "$DMG_DIR/${DMG_BASE}-${SUFFIX}.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lap-pr-macos-${{ matrix.arch }}-${{ github.event.pull_request.number || github.run_number }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: windows-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            windows-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
            src-tauri\target\
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x86_64-cargo-

      - name: Install frontend dependencies
        working-directory: src-vite
        run: pnpm install --frozen-lockfile

      - name: Download AI Models (Windows)
        shell: pwsh
        run: .\scripts\download_models.ps1

      - name: Force app frontend build command (Windows CI only)
        shell: pwsh
        run: |
          $path = "src-tauri/tauri.conf.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.build.beforeBuildCommand = "pnpm --dir ../src-vite build || pnpm --dir src-vite build"
          $json | ConvertTo-Json -Depth 100 | Set-Content -Path $path -Encoding utf8

      - name: Setup MSVC build environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build FFmpeg with vcpkg (Windows dynamic)
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          & "$vcpkgRoot\vcpkg.exe" install ffmpeg:x64-windows --clean-after-build

          $dllCandidates = @(
            (Join-Path $vcpkgRoot "installed\x64-windows\bin"),
            (Join-Path $vcpkgRoot "packages\ffmpeg_x64-windows\bin")
          )
          $ffmpegDllDir = $dllCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $ffmpegDllDir) {
            throw "FFmpeg DLL directory not found. Checked: $($dllCandidates -join ', ')"
          }
          $destDir = "src-tauri/resources/ffmpeg"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $dlls = Get-ChildItem -Path $ffmpegDllDir -Filter "*.dll" -File -ErrorAction SilentlyContinue
          $copied = 0
          foreach ($file in $dlls) {
            Copy-Item $file.FullName $destDir -Force
            $copied++
          }
          if ($copied -eq 0) {
            throw "No DLL files found in $ffmpegDllDir"
          }

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download DirectML.dll
        shell: pwsh
        run: |
          $work = Join-Path $env:RUNNER_TEMP "directml"
          $zip = Join-Path $work "directml.zip"
          $pkg = Join-Path $work "pkg"
          $dest = Join-Path $env:GITHUB_WORKSPACE "src-tauri/resources/ffmpeg/DirectML.dll"
          $destDir = Split-Path $dest -Parent

          New-Item -ItemType Directory -Force -Path $work | Out-Null
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null

          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.AI.DirectML/1.15.4" -OutFile $zip
          Expand-Archive $zip -DestinationPath $pkg -Force

          $dll = Join-Path $pkg "bin/x64-win/DirectML.dll"
          if (-not (Test-Path $dll)) {
            throw "DirectML.dll not found in package: $dll"
          }
          if (-not (Test-Path $destDir)) {
            throw "Destination directory was not created: $destDir"
          }

          Copy-Item -Path $dll -Destination $dest -Force
          if (-not (Test-Path $dest)) {
            throw "DirectML.dll was not copied to: $dest"
          }

      - name: Build and Sign (Windows x64)
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          args: --verbose --target x86_64-pc-windows-msvc --bundles msi --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Rename Windows package for PR build
        shell: pwsh
        run: |
          $suffix = "pr-${{ github.event.pull_request.number || github.run_number }}"
          $msi = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi" -Filter "*.msi" -File | Select-Object -First 1
          if (-not $msi) {
            throw "Could not find generated MSI file."
          }

          $newMsiName = "{0}-{1}{2}" -f [System.IO.Path]::GetFileNameWithoutExtension($msi.Name), $suffix, $msi.Extension
          $newMsiPath = Join-Path $msi.DirectoryName $newMsiName
          Move-Item -Path $msi.FullName -Destination $newMsiPath -Force

          $sigPath = "$($msi.FullName).sig"
          if (Test-Path $sigPath) {
            Move-Item -Path $sigPath -Destination "$newMsiPath.sig" -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lap-pr-windows-x64-${{ github.event.pull_request.number || github.run_number }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
          if-no-files-found: error

  publish-pr-build:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lap-pr-*
          path: release-files
          merge-multiple: true

      - name: Show release files
        run: ls -la release-files

      - name: Upload files to GitHub Release tag pr-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="pr-build"

          if ! gh release view "$TAG" -R "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              -R "$GH_REPO" \
              --title "PR Build" \
              --notes "Latest PR build artifacts (auto-updated by CI)." \
              --prerelease
          fi

          gh release view "$TAG" -R "$GH_REPO" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset "$TAG" "$asset" -R "$GH_REPO" -y
          done

          find release-files -type f | xargs gh release upload "$TAG" -R "$GH_REPO" --clobber
