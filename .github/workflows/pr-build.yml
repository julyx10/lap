name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: pr-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install system dependencies
        run: brew install nasm pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pr-macos-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pr-macos-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: pr-macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            pr-macos-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src-vite

      - name: Download AI Models
        shell: bash
        run: bash scripts/download_models.sh

      - name: Build app (unsigned)
        shell: bash
        run: |
          cargo tauri build --manifest-path src-tauri/Cargo.toml --verbose

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lap-pr-macos-${{ github.event.pull_request.number || github.run_number }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error

      - name: Comment download instructions on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- lap-pr-build-artifact -->';
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ✅ PR build finished.

            Download test package:
            1. Open this workflow run: ${runUrl}
            2. In **Artifacts**, download: \`lap-pr-macos-${prNumber}\`
            3. Extract and test the app package (\`.dmg\` or \`.app.tar.gz\`)
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
